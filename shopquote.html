<!DOCTYPE html>
<html lang="en" style="background:#0a0a0a">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>ShopQuote — ShopTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#181818;--bg4:#202020;
  --border:#272727;--border2:#333;
  --text:#f0ede8;--muted:#6b6866;--muted2:#9a9795;
  --orange:#e8500a;--orange-dim:#2a1508;--orange-border:#4a2010;
  --green:#22c55e;--green-dim:#0a2010;--green-border:#1a4020;
  --amber:#f59e0b;--amber-dim:#1a1200;--amber-border:#3a2800;
  --red:#ef4444;--red-dim:#1a0808;--red-border:#3a1010;
  --font:'DM Sans',sans-serif;--display:'Syne',sans-serif;--mono:'DM Mono',monospace;
  --r:10px;
}
html,body{font-family:var(--font);color:var(--text);background:var(--bg);min-height:100vh;overflow-x:hidden}

/* ── HEADER ── */
.app-header{background:var(--bg);border-bottom:1px solid var(--border);padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:12px}
.ah-left{display:flex;align-items:center;gap:10px}
.back-btn{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:6px 11px;font-family:var(--font);font-size:.76rem;font-weight:500;color:var(--muted2);cursor:pointer;text-decoration:none;white-space:nowrap;transition:color .15s,border-color .15s}
.back-btn:hover{color:var(--text);border-color:var(--border2)}
.ah-logo{display:flex;align-items:center;gap:7px}
.ah-logo-mark{width:26px;height:26px;background:var(--orange);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.85rem}
.ah-title{font-family:var(--display);font-size:.92rem;font-weight:700;color:var(--text)}
.btn{border:none;border-radius:7px;padding:7px 14px;font-family:var(--font);font-size:.78rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-primary{background:var(--orange);color:#fff}
.btn-ghost{background:var(--bg3);border:1px solid var(--border);color:var(--muted2)}
.btn-ghost:hover{color:var(--text)}
.btn-green{background:var(--green);color:#000;font-weight:700}
.btn-sm{padding:5px 11px;font-size:.73rem}

/* ── TABS ── */
.tab-bar{display:flex;background:var(--bg);border-bottom:1px solid var(--border);padding:0 20px;overflow-x:auto;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;font-family:var(--font);font-size:.85rem;font-weight:500;color:var(--muted);padding:12px 16px;cursor:pointer;white-space:nowrap;margin-bottom:-1px;transition:color .15s,border-color .15s}
.tab-btn.active{color:var(--orange);border-bottom-color:var(--orange)}
.tab-pane{display:none;padding:20px}
.tab-pane.active{display:block}

/* ── KANBAN ── */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.k-col{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.k-col-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.k-col-title{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.k-count{font-family:var(--mono);font-size:.7rem;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:1px 7px;color:var(--muted)}
.k-cards{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:80px}
.k-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;transition:border-color .15s,transform .15s}
.k-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.k-name{font-size:.88rem;font-weight:600;margin-bottom:3px}
.k-meta{font-size:.72rem;color:var(--muted);margin-bottom:8px;line-height:1.5}
.k-overdue{display:inline-flex;align-items:center;gap:4px;font-size:.68rem;color:var(--red);margin-bottom:6px}
.k-amount{font-family:var(--mono);font-size:.92rem;font-weight:500;color:var(--orange);margin-bottom:10px}
.k-actions{display:flex;gap:5px}
.k-btn{flex:1;background:var(--bg4);border:1px solid var(--border);border-radius:5px;font-family:var(--font);font-size:.7rem;font-weight:500;color:var(--muted2);padding:6px 4px;cursor:pointer;text-align:center;transition:color .15s}
.k-btn:hover{color:var(--text)}
.k-btn.sent{background:var(--orange-dim);border-color:var(--orange-border);color:var(--orange)}
.k-btn.paid{background:var(--green-dim);border-color:var(--green-border);color:var(--green)}

/* ── LIST ── */
.list-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.list-card:hover{border-color:var(--border2)}
.list-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.list-name{font-weight:600;font-size:.9rem}
.list-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.list-meta{font-size:.74rem;color:var(--muted)}
.list-amount{font-family:var(--mono);font-size:.88rem;color:var(--orange)}
.badge{font-size:.6rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:4px}
.b-muted{background:var(--bg3);color:var(--muted);border:1px solid var(--border)}
.b-amber{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-border)}
.b-green{background:var(--green-dim);color:var(--green);border:1px solid var(--green-border)}
.b-red{background:var(--red-dim);color:var(--red);border:1px solid var(--red-border)}

/* ── SECTION ── */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-family:var(--display);font-size:.92rem;font-weight:700}
.empty{text-align:center;padding:32px 16px;color:var(--muted);font-size:.85rem;line-height:1.7}
.empty strong{color:var(--text)}

/* ── FORM ── */
.form-stack{display:flex;flex-direction:column;gap:12px}
.form-row{display:flex;gap:10px}
.ff{display:flex;flex-direction:column;gap:4px;flex:1;min-width:0}
.ff label{font-size:.64rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.ff input,.ff select,.ff textarea{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:9px 11px;font-family:var(--font);font-size:.88rem;color:var(--text);outline:none;width:100%;transition:border-color .15s}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--orange)}
.ff input::placeholder,.ff textarea::placeholder{color:var(--muted)}
.ff select option{background:var(--bg3)}
.fs-title{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:2px}

/* ── LINE ITEMS ── */
.li-hdr{display:flex;gap:6px;padding:2px 6px}
.lih{font-size:.55rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:500}
.lih-d{flex:1}.lih-q{width:38px;text-align:center}.lih-u{width:60px}.lih-t{width:60px;text-align:right}.lih-x{width:20px}
.li-list{display:flex;flex-direction:column;gap:5px}
.li-item{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 9px}
.li-d{flex:1;font-size:.8rem;font-weight:500;min-width:0}
.li-q,.li-u{flex-shrink:0;font-family:var(--mono);color:var(--muted)}
.li-q{width:38px;font-size:.76rem;text-align:center}
.li-u{width:60px;font-size:.75rem}
.li-t{width:60px;font-family:var(--mono);font-size:.78rem;text-align:right;flex-shrink:0}
.li-x{width:20px;color:var(--muted);cursor:pointer;text-align:center;flex-shrink:0;font-size:.9rem}
.li-x:hover{color:var(--red)}
.add-li{display:flex;align-items:center;justify-content:center;gap:5px;padding:9px;border:1px dashed var(--border2);border-radius:7px;background:none;font-family:var(--font);font-size:.78rem;color:var(--muted);cursor:pointer;width:100%;transition:color .15s,border-color .15s}
.add-li:hover{color:var(--text);border-color:var(--orange)}
.labour-calc{font-size:.76rem;color:var(--muted);background:var(--bg3);border-radius:7px;padding:8px 10px}
.labour-calc span{font-family:var(--mono);color:var(--amber);font-weight:500}

/* ── MODAL ── */
.modal-wrap{position:fixed;inset:0;z-index:200;display:flex;align-items:flex-end;background:rgba(0,0,0,.75);backdrop-filter:blur(4px)}
.modal-wrap.center{align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px 16px 0 0;width:100%;max-width:640px;margin:0 auto;max-height:92vh;overflow-y:auto}
.modal-wrap.center .modal-box{border-radius:14px;max-width:440px}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:1}
.modal-head h3{font-family:var(--display);font-size:1rem;font-weight:700}
.modal-close{background:var(--bg3);border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.modal-actions{display:flex;gap:8px;margin-top:4px}
.modal-actions .btn{flex:1;justify-content:center}

/* ── VIEW MODAL (quote detail popup) ── */
.view-section{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.view-row{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);font-size:.84rem}
.view-row:last-child{border-bottom:none}
.view-label{font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:2px}
.view-val{font-size:.88rem;color:var(--text)}
.view-plate{display:inline-block;background:#f7c948;color:#000;font-family:var(--mono);font-size:.8rem;padding:2px 9px;border-radius:4px;border:1px solid #c9a200;letter-spacing:.1em}
.view-li-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);font-size:.84rem}
.view-li-row:last-child{border-bottom:none}
.view-li-desc{color:var(--text)}
.view-li-amt{font-family:var(--mono);color:var(--text)}
.view-total-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);font-size:.84rem}
.view-total-row:last-child{border-bottom:none;background:var(--bg4)}
.view-total-row.grand{font-family:var(--display);font-size:.96rem;font-weight:800}
.view-total-row.grand .view-tot-val{color:var(--orange)}
.view-tot-label{color:var(--muted)}
.view-tot-val{font-family:var(--mono);font-weight:500}
.view-action-row{display:flex;gap:8px}
.view-action-row .btn{flex:1;justify-content:center}

/* ── SETTINGS ── */
.settings-wrap{max-width:520px}
.save-note{margin-top:14px;padding:11px;background:var(--green-dim);border:1px solid var(--green-border);border-radius:var(--r);font-size:.8rem;color:var(--green)}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:7px 16px;font-size:.76rem;color:var(--muted2);opacity:0;transition:opacity .3s;z-index:999;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}

@media(max-width:640px){
  .kanban{grid-template-columns:1fr}
  .form-row{flex-wrap:wrap}
  .ff{min-width:calc(50% - 5px)}
  .tab-pane{padding:14px}
  .view-action-row{flex-direction:column}
}
</style>
</head>
<body>

<div class="app-header">
  <div class="ah-left">
    <a class="back-btn" href="index.html">← Home</a>
    <div class="ah-logo">
      <div class="ah-logo-mark">🧾</div>
      <div class="ah-title">ShopQuote</div>
    </div>
  </div>
  <div>
    <button class="btn btn-primary btn-sm" onclick="openQuoteModal(null)">+ New Quote</button>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('board',this)">📋 Status Board</button>
  <button class="tab-btn" onclick="switchTab('all',this)">📄 All Quotes</button>
  <button class="tab-btn" onclick="switchTab('invoices',this)">🧾 Invoices</button>
  <button class="tab-btn" onclick="switchTab('settings',this)">⚙️ Settings</button>
</div>

<!-- STATUS BOARD -->
<div id="pane-board" class="tab-pane active">
  <div class="kanban" id="kanban"></div>
</div>

<!-- ALL QUOTES -->
<div id="pane-all" class="tab-pane">
  <div class="section-head">
    <div class="section-title">All Quotes</div>
    <button class="btn btn-primary btn-sm" onclick="openQuoteModal(null)">+ New</button>
  </div>
  <div id="allList"></div>
</div>

<!-- INVOICES -->
<div id="pane-invoices" class="tab-pane">
  <div class="section-head"><div class="section-title">Invoices</div></div>
  <div id="invList"></div>
</div>

<!-- SETTINGS -->
<div id="pane-settings" class="tab-pane">
  <div class="settings-wrap">
    <div class="section-title" style="margin-bottom:14px">Shop Settings</div>
    <div class="form-stack">
      <div class="ff"><label>Shop / Business Name</label><input type="text" id="sName" placeholder="e.g. Mike's Auto & Bodyshop" oninput="saveSettings()"/></div>
      <div class="ff"><label>Address</label><input type="text" id="sAddr" placeholder="Unit 4, Riverside Estate" oninput="saveSettings()"/></div>
      <div class="form-row">
        <div class="ff"><label>Phone</label><input type="text" id="sPhone" placeholder="07..." oninput="saveSettings()"/></div>
        <div class="ff"><label>Email</label><input type="text" id="sEmail" placeholder="shop@..." oninput="saveSettings()"/></div>
      </div>
      <div class="form-row">
        <div class="ff"><label>Labour Rate (£/hr)</label><input type="number" id="sLabour" placeholder="35" oninput="saveSettings()"/></div>
        <div class="ff"><label>VAT Rate (%)</label><input type="number" id="sVat" placeholder="20" oninput="saveSettings()"/></div>
      </div>
      <div class="ff"><label>Default Terms</label><textarea id="sTerms" rows="3" placeholder="50% deposit required..." oninput="saveSettings()"></textarea></div>
    </div>
    <div class="save-note">✓ Settings auto-save as you type</div>
  </div>
</div>

<!-- NEW/EDIT QUOTE MODAL -->
<div id="quoteModal" class="modal-wrap" style="display:none">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="qModalTitle">New Quote</h3>
      <button class="modal-close" onclick="closeModal('quoteModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="fs-title">Customer</div>
      <div class="ff"><label>Client name</label><input type="text" id="qName" placeholder="Full name"/></div>
      <div class="form-row">
        <div class="ff"><label>Phone</label><input type="tel" id="qPhone" placeholder="07..."/></div>
        <div class="ff"><label>Email</label><input type="email" id="qEmail" placeholder="email@..."/></div>
      </div>
      <div class="fs-title">Vehicle</div>
      <div class="form-row">
        <div class="ff"><label>Reg plate</label><input type="text" id="qReg" placeholder="AB21 XYZ" style="text-transform:uppercase"/></div>
        <div class="ff"><label>Make / Model</label><input type="text" id="qModel" placeholder="Ford Focus ST"/></div>
      </div>
      <div class="form-row">
        <div class="ff"><label>Year</label><input type="text" id="qYear" placeholder="2019"/></div>
        <div class="ff"><label>Colour</label><input type="text" id="qColour" placeholder="Black"/></div>
      </div>
      <div class="fs-title">Job</div>
      <div class="ff"><label>Work description</label><textarea id="qDesc" rows="2" placeholder="e.g. Full respray — bonnet and roof"></textarea></div>
      <div class="fs-title">Parts &amp; Labour</div>
      <div class="li-hdr">
        <span class="lih lih-d">Item</span><span class="lih lih-q">Qty</span>
        <span class="lih lih-u">Unit £</span><span class="lih lih-t">Total</span><span class="lih lih-x"></span>
      </div>
      <div class="li-list" id="qLines"></div>
      <button class="add-li" onclick="addLine()">+ Add line item</button>
      <div class="labour-calc">Labour: <span id="qLabourCalc">£0.00</span></div>
      <div class="fs-title">Notes</div>
      <div class="ff"><label>Notes / Terms (printed on quote)</label><textarea id="qNotes" rows="2"></textarea></div>
      <div class="form-row">
        <div class="ff"><label>Quote date</label><input type="date" id="qDate"/></div>
        <div class="ff"><label>Valid until</label><input type="date" id="qValid"/></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal('quoteModal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveQuote()">Save Quote</button>
      </div>
    </div>
  </div>
</div>

<!-- VIEW QUOTE MODAL -->
<div id="viewModal" class="modal-wrap" style="display:none">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="vModalTitle">Quote</h3>
      <button class="modal-close" onclick="closeModal('viewModal')">✕</button>
    </div>
    <div class="modal-body" id="vModalBody"></div>
  </div>
</div>

<!-- DELETE CONFIRM -->
<div id="delModal" class="modal-wrap center" style="display:none">
  <div class="modal-box">
    <div class="modal-head"><h3>Delete?</h3></div>
    <div class="modal-body">
      <p id="delMsg" style="font-size:.88rem;color:var(--muted2)">This cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal('delModal')">Cancel</button>
        <button class="btn" style="background:var(--red);color:#fff;flex:1;justify-content:center" onclick="confirmDel()">Delete</button>
      </div>
    </div>
  </div>
</div>

<!-- ADD TO GT MODAL -->
<div id="gtModal" class="modal-wrap center" style="display:none">
  <div class="modal-box">
    <div class="modal-head"><h3>Add to Garage Tracker?</h3></div>
    <div class="modal-body">
      <p id="gtMsg" style="font-size:.88rem;color:var(--muted2);line-height:1.6"></p>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal('gtModal')">Skip</button>
        <button class="btn btn-green" onclick="doAddToGT()">Yes, add it</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── STATE ──
let state = { quotes:[], settings:{ name:'', addr:'', phone:'', email:'', labour:35, vat:20, terms:'50% deposit required before work begins. Quote valid for 14 days.' } };
let editId = null, curLines = [], pendDelId = null, pendGTId = null;

function save() { localStorage.setItem('sq_v2', JSON.stringify(state)); toast('Saved ✓') }
function load() { try { const d=localStorage.getItem('sq_v2'); if(d) state={...state,...JSON.parse(d)} } catch(e){} }

// ── UTILS ──
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,5) }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function fmt(n) { return '£'+Math.abs(parseFloat(n)||0).toFixed(2) }
function fmtS(n) { const v=parseFloat(n)||0; return (v<0?'-':'')+fmt(v) }
function fmtD(iso) { if(!iso) return '—'; const d=new Date(iso+'T00:00:00'); return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) }
function tod() { return new Date().toISOString().slice(0,10) }
function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1500) }
function showModal(id) { document.getElementById(id).style.display='flex' }
function closeModal(id) { document.getElementById(id).style.display='none' }
function calcTotals(lines) { const sub=lines.reduce((s,l)=>s+(l.qty||0)*(l.unit||0),0); const vat=sub*((state.settings.vat||20)/100); return {sub,vat,total:sub+vat} }
function isOverdue(q) { if(q.status!=='sent') return false; return (new Date()-new Date(q.sentAt||q.date||tod()))/(864e5)>=2 }
function overdueDays(q) { return Math.floor((new Date()-new Date(q.sentAt||q.date||tod()))/(864e5)) }

// ── TABS ──
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pane-'+name).classList.add('active');
  render();
}

// ── SETTINGS ──
function loadSettings() {
  const s=state.settings;
  document.getElementById('sName').value=s.name||'';
  document.getElementById('sAddr').value=s.addr||'';
  document.getElementById('sPhone').value=s.phone||'';
  document.getElementById('sEmail').value=s.email||'';
  document.getElementById('sLabour').value=s.labour||35;
  document.getElementById('sVat').value=s.vat||20;
  document.getElementById('sTerms').value=s.terms||'';
}
function saveSettings() {
  state.settings = {
    name:document.getElementById('sName').value,
    addr:document.getElementById('sAddr').value,
    phone:document.getElementById('sPhone').value,
    email:document.getElementById('sEmail').value,
    labour:parseFloat(document.getElementById('sLabour').value)||35,
    vat:parseFloat(document.getElementById('sVat').value)||20,
    terms:document.getElementById('sTerms').value
  };
  save();
}

// ── QUOTE MODAL ──
function openQuoteModal(id) {
  editId = id;
  document.getElementById('qModalTitle').textContent = id ? 'Edit Quote' : 'New Quote';
  curLines = [];
  if (id) {
    const q = state.quotes.find(x=>x.id===id);
    if (!q) return;
    document.getElementById('qName').value=q.name||'';
    document.getElementById('qPhone').value=q.phone||'';
    document.getElementById('qEmail').value=q.email||'';
    document.getElementById('qReg').value=q.reg||'';
    document.getElementById('qModel').value=q.model||'';
    document.getElementById('qYear').value=q.year||'';
    document.getElementById('qColour').value=q.colour||'';
    document.getElementById('qDesc').value=q.desc||'';
    document.getElementById('qNotes').value=q.notes||'';
    document.getElementById('qDate').value=q.date||'';
    document.getElementById('qValid').value=q.valid||'';
    curLines = JSON.parse(JSON.stringify(q.lines||[]));
  } else {
    ['qName','qPhone','qEmail','qReg','qModel','qYear','qColour','qDesc','qValid'].forEach(x=>document.getElementById(x).value='');
    document.getElementById('qDate').value=tod();
    const dd=new Date(); dd.setDate(dd.getDate()+14);
    document.getElementById('qValid').value=dd.toISOString().slice(0,10);
    document.getElementById('qNotes').value=state.settings.terms||'';
  }
  renderLines(); showModal('quoteModal');
}
function addLine(item) { curLines.push(item||{id:uid(),desc:'',qty:1,unit:0}); renderLines() }
function removeLine(id) { curLines=curLines.filter(l=>l.id!==id); renderLines() }
function renderLines() {
  const el=document.getElementById('qLines');
  el.innerHTML=curLines.map(l=>`<div class="li-item">
    <input class="li-d" style="background:transparent;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:.8rem;padding:0;flex:1;min-width:0" placeholder="Item description" value="${esc(l.desc)}" oninput="updateLine('${l.id}','desc',this.value)"/>
    <input class="li-q" style="background:transparent;border:none;outline:none;color:var(--muted2);font-family:var(--mono);font-size:.76rem;padding:0;text-align:center;width:38px" type="number" min="0" step="0.5" value="${l.qty}" oninput="updateLine('${l.id}','qty',this.value)"/>
    <input class="li-u" style="background:transparent;border:none;outline:none;color:var(--muted2);font-family:var(--mono);font-size:.75rem;padding:0;width:60px" type="number" min="0" step="0.01" placeholder="0.00" value="${l.unit||''}" oninput="updateLine('${l.id}','unit',this.value)"/>
    <span class="li-t" id="lt-${l.id}">${fmt((l.qty||0)*(l.unit||0))}</span>
    <span class="li-x" onclick="removeLine('${l.id}')">×</span>
  </div>`).join('');
  updateLabour();
}
function updateLine(id, field, val) {
  const l=curLines.find(x=>x.id===id); if(!l) return;
  if(field==='qty') l.qty=parseFloat(val)||0;
  else if(field==='unit') l.unit=parseFloat(val)||0;
  else l[field]=val;
  const t=document.getElementById('lt-'+id); if(t) t.textContent=fmt((l.qty||0)*(l.unit||0));
  updateLabour();
}
function updateLabour() {
  const ll=curLines.find(l=>/labour/i.test(l.desc||''));
  const c=ll?(ll.qty||0)*(ll.unit||0):0;
  const el=document.getElementById('qLabourCalc'); if(el) el.textContent=fmt(c);
}
function saveQuote() {
  const name=document.getElementById('qName').value.trim();
  if(!name){alert('Please enter a client name.');return}
  const q={
    id:editId||uid(), name,
    phone:document.getElementById('qPhone').value.trim(),
    email:document.getElementById('qEmail').value.trim(),
    reg:document.getElementById('qReg').value.trim().toUpperCase(),
    model:document.getElementById('qModel').value.trim(),
    year:document.getElementById('qYear').value.trim(),
    colour:document.getElementById('qColour').value.trim(),
    desc:document.getElementById('qDesc').value.trim(),
    notes:document.getElementById('qNotes').value.trim(),
    date:document.getElementById('qDate').value,
    valid:document.getElementById('qValid').value,
    lines:JSON.parse(JSON.stringify(curLines)),
    status:'unsent', isInvoice:false, createdAt:new Date().toISOString()
  };
  if(editId) {
    const idx=state.quotes.findIndex(x=>x.id===editId);
    if(idx>=0){const old=state.quotes[idx];q.status=old.status;q.isInvoice=old.isInvoice;q.sentAt=old.sentAt;q.paidAt=old.paidAt;state.quotes[idx]=q}
  } else state.quotes.push(q);
  save(); closeModal('quoteModal'); render();
}

// ── VIEW QUOTE ──
function openView(id) {
  const q=state.quotes.find(x=>x.id===id); if(!q) return;
  const tots=calcTotals(q.lines||[]);
  const s=state.settings;
  const statusLabel=q.status==='paid'?'✅ Paid':q.status==='sent'?'⏳ Awaiting':'📋 Unsent';
  const statusColor=q.status==='paid'?'var(--green)':q.status==='sent'?'var(--amber)':'var(--muted)';

  document.getElementById('vModalTitle').textContent=(q.isInvoice?'Invoice':'Quote')+' — '+q.name;

  // Build modal body
  let html=`
    <!-- Status + client -->
    <div class="view-section">
      <div class="view-row" style="align-items:center">
        <div>
          <div style="font-weight:700;font-size:.95rem">${esc(q.name)}</div>
          <div style="font-size:.74rem;color:var(--muted);margin-top:2px">${q.phone?esc(q.phone)+' · ':''}${esc(q.email||'')}</div>
        </div>
        <span style="font-size:.68rem;font-weight:700;color:${statusColor};background:var(--bg4);padding:4px 10px;border-radius:10px">${statusLabel}</span>
      </div>
      ${q.reg||q.model?`<div class="view-row" style="flex-direction:column;align-items:flex-start;gap:5px">
        <div class="view-label">Vehicle</div>
        ${q.reg?`<div class="view-plate">${esc(q.reg)}</div>`:''}
        <div class="view-val">${q.year?q.year+' ':''}${esc(q.model||'')}${q.colour?' · '+esc(q.colour):''}</div>
      </div>`:''}
      ${q.desc?`<div class="view-row" style="flex-direction:column;align-items:flex-start;gap:4px">
        <div class="view-label">Job</div>
        <div class="view-val">${esc(q.desc)}</div>
      </div>`:''}
      <div class="view-row">
        <div><div class="view-label">Date</div><div class="view-val" style="font-family:var(--mono);font-size:.82rem">${fmtD(q.date)}</div></div>
        <div style="text-align:right"><div class="view-label">Valid until</div><div class="view-val" style="font-family:var(--mono);font-size:.82rem">${fmtD(q.valid)}</div></div>
      </div>
    </div>

    <!-- Line items -->
    <div style="font-family:var(--display);font-size:.82rem;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Line Items</div>
    <div class="view-section">
      ${(q.lines||[]).map(l=>`<div class="view-li-row">
        <span class="view-li-desc" style="${/labour/i.test(l.desc)?'color:var(--orange)':''}">${esc(l.desc)} ×${l.qty||0}</span>
        <span class="view-li-amt" style="${/labour/i.test(l.desc)?'color:var(--orange)':''}">${fmt((l.qty||0)*(l.unit||0))}</span>
      </div>`).join('')}
    </div>

    <!-- Totals -->
    <div class="view-section">
      <div class="view-total-row"><span class="view-tot-label">Subtotal</span><span class="view-tot-val">${fmt(tots.sub)}</span></div>
      <div class="view-total-row"><span class="view-tot-label">VAT (${s.vat||20}%)</span><span class="view-tot-val">${fmt(tots.vat)}</span></div>
      <div class="view-total-row grand"><span>Total Due</span><span class="view-tot-val">${fmt(tots.total)}</span></div>
    </div>

    <!-- Actions -->
    <div class="view-action-row">
      <button class="btn btn-ghost" onclick="printQuote('${id}')">📄 Download PDF</button>
      <button class="btn btn-ghost" onclick="closeModal('viewModal');openQuoteModal('${id}')">✏️ Edit</button>
    </div>`;

  // Status action buttons
  if(q.status==='unsent') html+=`<div class="view-action-row"><button class="btn btn-primary" style="flex:1;justify-content:center" onclick="markStatus('${id}','sent')">📤 Mark as Sent → Invoice</button></div>`;
  if(q.status==='sent') html+=`<div class="view-action-row"><button class="btn btn-green" style="flex:1;justify-content:center" onclick="markStatus('${id}','paid')">✓ Mark as Paid</button></div>`;
  if(q.status!=='paid') html+=`<div class="view-action-row"><button class="btn btn-ghost" style="flex:1;justify-content:center;color:var(--red)" onclick="askDel('${id}')">🗑 Delete</button></div>`;
  if(q.status==='paid') html+=`<div style="text-align:center;padding:10px;color:var(--green);font-size:.82rem;font-weight:600">✅ Paid on ${fmtD(q.paidAt)}</div>`;

  document.getElementById('vModalBody').innerHTML=html;
  showModal('viewModal');
}

function printQuote(id) {
  const q=state.quotes.find(x=>x.id===id); if(!q) return;
  const s=state.settings;
  const tots=calcTotals(q.lines||[]);
  const rows=(q.lines||[]).map(l=>`<tr><td>${esc(l.desc)}</td><td style="text-align:center">${l.qty||0}</td><td style="text-align:right">${fmt(l.unit||0)}</td><td style="text-align:right;font-weight:600">${fmt((l.qty||0)*(l.unit||0))}</td></tr>`).join('');
  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>${q.isInvoice?'Invoice':'Quote'} — ${q.name}</title>
  <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Helvetica Neue',Arial,sans-serif;font-size:13px;color:#111;padding:40px;max-width:680px;margin:0 auto}.head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px;padding-bottom:20px;border-bottom:2px solid #111}.shop{font-size:18px;font-weight:800;letter-spacing:-.02em}.shop-sub{font-size:11px;color:#666;margin-top:3px}.badge{background:#e8500a;color:#fff;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:4px 10px;border-radius:3px}.meta{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid #e5e5e5;border-radius:6px;overflow:hidden;margin-bottom:20px}.mc{padding:10px 12px;border-right:1px solid #e5e5e5}.mc:last-child{border-right:none}.ml{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:2px}.mv{font-size:12px;font-weight:600;font-family:'Courier New',monospace}.parties{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}.party-label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:4px}.party-name{font-size:13px;font-weight:700;margin-bottom:2px}.party-det{font-size:11px;color:#666;line-height:1.5}.plate{display:inline-block;background:#f7c948;color:#000;font-family:'Courier New',monospace;font-size:11px;padding:2px 7px;border-radius:3px;border:1px solid #c9a200;letter-spacing:.1em;margin-bottom:3px}.jd{padding:10px 12px;background:#fff8f5;border:1px solid #fdd;border-radius:6px;margin-bottom:16px;font-size:12px}table{width:100%;border-collapse:collapse;margin-bottom:16px}th{text-align:left;padding:8px 10px;background:#f8f8f8;border-bottom:2px solid #e5e5e5;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#666}td{padding:10px;border-bottom:1px solid #f0f0f0;font-size:12px}.tots{border:1px solid #e5e5e5;border-radius:6px;overflow:hidden}.tot-row{display:flex;justify-content:space-between;padding:9px 12px;border-bottom:1px solid #f0f0f0;font-size:12px}.tot-row.grand{font-weight:800;font-size:14px;background:#f8f8f8;border-bottom:none}.tot-row.grand .tv{color:#e8500a}.tv{font-family:'Courier New',monospace;font-weight:500}.tl{color:#666}.notes{margin-top:16px;padding:10px 12px;background:#f8f8f8;border-radius:6px;font-size:11px;color:#555;line-height:1.6}@media print{body{padding:20px}}</style></head>
  <body>
  <div class="head"><div><div class="shop">${esc(s.name||'Your Shop')}</div><div class="shop-sub">${esc(s.addr||'')}${s.phone?' · '+esc(s.phone):''}</div></div><div class="badge">${q.isInvoice?'INVOICE':'QUOTATION'}</div></div>
  <div class="meta"><div class="mc"><div class="ml">${q.isInvoice?'Invoice':'Quote'} No.</div><div class="mv" style="color:#e8500a">${q.id.slice(-6).toUpperCase()}</div></div><div class="mc"><div class="ml">Date</div><div class="mv">${fmtD(q.date)}</div></div><div class="mc"><div class="ml">Valid until</div><div class="mv">${fmtD(q.valid)}</div></div><div class="mc"><div class="ml">Status</div><div class="mv">${q.status==='paid'?'Paid':q.status==='sent'?'Sent':'Pending'}</div></div></div>
  <div class="parties"><div><div class="party-label">Bill to</div><div class="party-name">${esc(q.name)}</div><div class="party-det">${q.phone?esc(q.phone)+'<br>':''}${esc(q.email||'')}</div></div><div><div class="party-label">Vehicle</div>${q.reg?`<div class="plate">${esc(q.reg)}</div><br>`:''}<div class="party-det">${q.year?q.year+' ':''}${esc(q.model||'')}${q.colour?'<br>'+esc(q.colour):''}</div></div></div>
  ${q.desc?`<div class="jd"><strong>Job:</strong> ${esc(q.desc)}</div>`:''}
  <table><thead><tr><th>Item / Description</th><th style="text-align:center">Qty</th><th style="text-align:right">Unit</th><th style="text-align:right">Total</th></tr></thead><tbody>${rows}</tbody></table>

  ${q.notes?`<div class="notes"><strong>Terms:</strong> ${esc(q.notes)}</div>`:''}
  </body></html>`);
  win.document.close();
  win.focus();
  setTimeout(()=>win.print(),400);
}

function markStatus(id, status) {
  const q=state.quotes.find(x=>x.id===id); if(!q) return;
  q.status=status;
  if(status==='sent'){q.sentAt=tod();q.isInvoice=true}
  if(status==='paid'){
    q.paidAt=tod();
    // Auto-silently create job in Garage Tracker
    autoCreateGTJob(q);
  }
  save();
  closeModal('viewModal');
  render();
}

function autoCreateGTJob(q) {
  try {
    const tots=calcTotals(q.lines||[]);
    // Load existing GT data
    let gtData = {jobs:[], ads:[]};
    try { const d=localStorage.getItem('gt_v2'); if(d) gtData={...gtData,...JSON.parse(d)} } catch(e){}
    // Build the job — pre-fill everything we know from the quote
    const newJob = {
      id: 'sq_'+q.id, // prefix so we know it came from ShopQuote
      name: q.name,
      type: q.desc ? q.desc.split(/[—–-]/)[0].trim().substring(0,30) : '',
      booked: q.date || tod(),
      done: q.paidAt || tod(),
      price: tots.total.toFixed(2),
      mats: '',   // owner fills this in GT
      hours: '',  // owner fills this in GT
      notes: q.desc || ''
    };
    // Don't duplicate — remove any existing job with same sq_ id
    gtData.jobs = gtData.jobs.filter(j=>j.id!=='sq_'+q.id);
    gtData.jobs.push(newJob);
    localStorage.setItem('gt_v2', JSON.stringify(gtData));
  } catch(e) { console.error('GT sync failed', e) }
}

function askDel(id) { pendDelId=id; document.getElementById('delMsg').textContent='Delete this quote? Cannot be undone.'; closeModal('viewModal'); showModal('delModal') }
function confirmDel() { state.quotes=state.quotes.filter(x=>x.id!==pendDelId); save(); closeModal('delModal'); render() }

// ── RENDER ──
function render() {
  loadSettings();
  const unsent=state.quotes.filter(q=>q.status==='unsent');
  const sent=state.quotes.filter(q=>q.status==='sent');
  const paid=state.quotes.filter(q=>q.status==='paid');

  // Kanban
  document.getElementById('kanban').innerHTML=[
    {key:'unsent',title:'📋 Unsent',color:'var(--muted)',items:unsent,empty:'No unsent quotes'},
    {key:'sent',title:'⏳ Awaiting Payment',color:'var(--amber)',items:sent,empty:'No outstanding invoices'},
    {key:'paid',title:'✅ Paid',color:'var(--green)',items:paid,empty:'No paid invoices yet'}
  ].map(col=>`<div class="k-col">
    <div class="k-col-head">
      <span class="k-col-title" style="color:${col.color}">${col.title}</span>
      <span class="k-count">${col.items.length}</span>
    </div>
    <div class="k-cards">
      ${col.items.length===0?`<div style="font-size:.74rem;color:var(--muted);padding:8px;text-align:center">${col.empty}</div>`:
        col.items.map(q=>{
          const t=calcTotals(q.lines||[]);
          const ov=isOverdue(q);
          return `<div class="k-card">
            <div class="k-name">${esc(q.name)}</div>
            <div class="k-meta">${esc(q.model||'')}${q.reg?' · '+esc(q.reg):''}<br/>${fmtD(q.date)}</div>
            ${ov?`<div class="k-overdue">⚠️ Overdue ${overdueDays(q)} days</div>`:''}
            <div class="k-amount">${fmt(t.total)}</div>
            <div class="k-actions">
              ${col.key==='unsent'?`<button class="k-btn sent" onclick="markStatus('${q.id}','sent')">Mark Sent</button>`:''}
              ${col.key==='sent'?`<button class="k-btn paid" onclick="markStatus('${q.id}','paid')">Mark Paid</button>`:''}
              <button class="k-btn" onclick="openView('${q.id}')">View</button>
              <button class="k-btn" onclick="openQuoteModal('${q.id}')">Edit</button>
            </div>
          </div>`;
        }).join('')}
    </div>
  </div>`).join('');

  // All list
  document.getElementById('allList').innerHTML=state.quotes.length===0?`<div class="empty">No quotes yet. Tap <strong>+ New Quote</strong> to create your first.</div>`:
    state.quotes.map(q=>{
      const t=calcTotals(q.lines||[]);
      const bc=q.status==='paid'?'b-green':q.status==='sent'?'b-amber':'b-muted';
      return `<div class="list-card" onclick="openView('${q.id}')">
        <div class="list-top">
          <div><div class="list-name">${esc(q.name)}</div><div class="list-meta">${esc(q.model||'')}${q.reg?' · '+esc(q.reg):''} · ${fmtD(q.date)}</div></div>
          <div class="list-right"><span class="badge ${bc}">${q.status}</span><span class="list-amount">${fmt(t.total)}</span></div>
        </div>
        ${q.desc?`<div style="font-size:.76rem;color:var(--muted)">${esc(q.desc)}</div>`:''}
      </div>`;
    }).join('');

  // Invoices list
  const inv=state.quotes.filter(q=>q.isInvoice);
  document.getElementById('invList').innerHTML=inv.length===0?`<div class="empty">No invoices yet.<br/>Mark a quote as <strong>Sent</strong> to convert it.</div>`:
    inv.map(q=>{
      const t=calcTotals(q.lines||[]);
      const ov=isOverdue(q);
      const bc=q.status==='paid'?'b-green':ov?'b-red':'b-amber';
      return `<div class="list-card" onclick="openView('${q.id}')">
        <div class="list-top">
          <div><div class="list-name">${esc(q.name)}</div><div class="list-meta">Sent ${fmtD(q.sentAt)}${q.paidAt?' · Paid '+fmtD(q.paidAt):''}</div></div>
          <div class="list-right"><span class="badge ${bc}">${q.status==='paid'?'Paid':ov?'Overdue':'Awaiting'}</span><span class="list-amount">${fmt(t.total)}</span></div>
        </div>
      </div>`;
    }).join('');
}

// ── BOOT ──
load(); render();
</script>
</body>
</html>
